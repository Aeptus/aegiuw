name: worker

on:
  push:
    paths:
      - "workers/**"
      - ".github/workflows/worker.yml"
  pull_request:
    paths:
      - "workers/**"
      - ".github/workflows/worker.yml"
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/aegiuw-router
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: workers/aegiuw-router/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
